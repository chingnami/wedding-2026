<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap');
:root{--rose:#e8a0b0;--deep:#c0607a;--blush:#f9e8ed;--gold:#d4a853;--cream:#fdf6f0;--text:#4a3040;--shadow:rgba(192,96,122,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

/* HEADER */
header{background:linear-gradient(135deg,#c0607a,#e8a0b0,#d4a853);padding:30px 20px 20px;text-align:center}
header h1{font-family:'Playfair Display',serif;font-size:2em;color:#fff;text-shadow:2px 2px 8px rgba(0,0,0,.2)}
header p{color:rgba(255,255,255,.9);font-size:.9em;margin-top:6px;letter-spacing:2px}

/* COUNTDOWN */
.countdown{display:flex;justify-content:center;gap:16px;margin:14px 0 4px;flex-wrap:wrap}
.cd-box{background:rgba(255,255,255,.25);border-radius:12px;padding:10px 18px;text-align:center;min-width:70px}
.cd-box .num{font-size:1.8em;font-weight:700;color:#fff;line-height:1}
.cd-box .lbl{font-size:.7em;color:rgba(255,255,255,.85);margin-top:2px}

/* TABS */
.tab-bar{display:flex;overflow-x:auto;background:#fff;border-bottom:2px solid var(--blush);padding:0 10px;gap:2px}
.tab-btn{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:.82em;font-weight:700;color:#999;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--deep);border-bottom-color:var(--deep)}
.tab-btn:hover{color:var(--deep)}

/* CONTENT */
.tab-content{display:none;padding:20px 15px 60px;max-width:960px;margin:0 auto}
.tab-content.active{display:block}

/* SECTION TITLE */
.section-title{font-family:'Playfair Display',serif;font-size:1.3em;color:var(--deep);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--blush)}

/* CARDS */
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 4px 16px var(--shadow)}
.card h3{font-size:1em;color:var(--deep);margin-bottom:8px;font-weight:700}

/* TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--rose)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--deep);border:2px solid #fff;box-shadow:0 0 0 2px var(--rose)}
.tl-time{font-size:.78em;font-weight:700;color:var(--deep);background:var(--blush);display:inline-block;padding:2px 8px;border-radius:20px;margin-bottom:4px}
.tl-title{font-size:.95em;font-weight:700}
.tl-desc{font-size:.82em;color:#777;margin-top:3px;white-space:pre-line}
.tl-roles{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.role-tag{font-size:.7em;background:var(--blush);color:var(--deep);padding:2px 8px;border-radius:20px}

/* BUDGET */
.budget-summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.bsum{flex:1;min-width:120px;background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 4px 16px var(--shadow);border-top:3px solid var(--rose)}
.bsum .val{font-size:1.3em;font-weight:700;color:var(--deep)}
.bsum .lbl{font-size:.72em;color:#999;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:.85em}
th{background:var(--blush);color:var(--deep);padding:8px 10px;text-align:left;font-weight:700}
td{padding:7px 10px;border-bottom:1px solid #f0e8ec}
tr:hover td{background:#fdf0f4}
.pos{color:#27ae60;font-weight:700}
.neg{color:#e74c3c;font-weight:700}
.cat-row td{background:#fdf6f0;font-weight:700;color:var(--text)}

/* CHECKLIST */
.check-group{margin-bottom:20px}
.check-group h3{font-size:.95em;color:var(--deep);margin-bottom:10px;font-weight:700}
.check-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5eaee;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--deep);cursor:pointer}
.check-item label{cursor:pointer;font-size:.9em}
.check-item.done label{text-decoration:line-through;color:#bbb}
.check-progress{background:#eee;border-radius:10px;height:8px;margin-bottom:16px;overflow:hidden}
.check-bar{height:100%;background:linear-gradient(90deg,var(--deep),var(--rose));border-radius:10px;transition:width .4s}

/* CONTACTS */
.contact-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 16px var(--shadow);display:flex;align-items:center;gap:14px}

.contact-info .role{font-size:.78em;color:#999}
.contact-info .phone{font-size:.85em;color:var(--deep);margin-top:2px}
.contact-info a{color:var(--deep);text-decoration:none}

.table-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 16px var(--shadow)}
.table-card h3{font-size:.9em;color:var(--deep);margin-bottom:8px;font-weight:700;background:var(--blush);padding:6px 10px;border-radius:8px}

.seat-item:last-child{border-bottom:none}
.seat-num{font-size:.7em;background:var(--rose);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* GUESTS */
.guest-search{width:100%;padding:10px 14px;border:2px solid var(--blush);border-radius:12px;font-size:.9em;margin-bottom:14px;outline:none}
.guest-search:focus{border-color:var(--rose)}
.guest-table{width:100%;border-collapse:collapse;font-size:.85em}
.guest-table th{background:var(--blush);color:var(--deep);padding:8px 10px;text-align:left}
.guest-table td{padding:7px 10px;border-bottom:1px solid #f0e8ec}
.guest-table tr:hover td{background:#fdf0f4}

.stat-box .l{font-size:.72em;color:#999}

@media(max-width:600px){header h1{font-size:1.5em}.tab-btn{padding:10px 10px;font-size:.75em}}
</style>

function renderCountdown(){
  const now=new Date(), diff=WEDDING_DATE-now;
  if(diff<=0){document.getElementById('countdown').innerHTML='<div class="cd-box"><div class="num">🎊</div><div class="lbl">今日大喜！</div></div>';return}
  const d=Math.floor(diff/86400000),h=Math.floor(diff%86400000/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
  document.getElementById('countdown').innerHTML=`
    <div class="cd-box"><div class="num">${d}</div><div class="lbl">天</div></div>
    <div class="cd-box"><div class="num">${h}</div><div class="lbl">時</div></div>
    <div class="cd-box"><div class="num">${m}</div><div class="lbl">分</div></div>
    <div class="cd-box"><div class="num">${s}</div><div class="lbl">秒</div></div>`;
}
setInterval(renderCountdown,1000);renderCountdown();

function renderBudget(){
  let totalB=0,totalA=0;
  const cats={};
  budget.forEach(r=>{
    const b=(r.qty||0)*(r.unitB||0), a=(r.qty2||0)*(r.unitA||0);
    totalB+=b; totalA+=a;
    if(!cats[r.cat])cats[r.cat]={b:0,a:0};
    cats[r.cat].b+=b; cats[r.cat].a+=a;
  });
  document.getElementById('budgetSummary').innerHTML=`
    <div class="bsum"><div class="val">$${totalB.toLocaleString()}</div><div class="lbl">預算總計</div></div>
    <div class="bsum"><div class="val">$${totalA.toLocaleString()}</div><div class="lbl">實際總計</div></div>
    <div class="bsum"><div class="val ${totalA-totalB>=0?'neg':'pos'}">$${Math.abs(totalA-totalB).toLocaleString()}</div><div class="lbl">${totalA-totalB>=0?'超支':'節省'}</div></div>
    <div class="bsum"><div class="val">${Object.keys(cats).length}</div><div class="lbl">分類</div></div>`;
  let html='',lastCat='';
  budget.forEach(r=>{
    if(r.cat!==lastCat){
      const c=cats[r.cat];
      html+=`<tr class="cat-row"><td colspan="2"><b>【${r.cat}】</b></td><td>$${c.b.toLocaleString()}</td><td>$${c.a.toLocaleString()}</td><td class="${c.a-c.b>=0&&c.b>0?'neg':'pos'}">${c.b>0||c.a>0?'$'+(Math.abs(c.a-c.b)).toLocaleString():'-'}</td></tr>`;
      lastCat=r.cat;
    }
    const b=(r.qty||0)*(r.unitB||0), a=(r.qty2||0)*(r.unitA||0), diff=a-b;
    html+=`<tr><td></td><td>${r.item}</td><td>${b?'$'+b.toLocaleString():'-'}</td><td>${a?'$'+a.toLocaleString():'-'}</td><td class="${diff>0?'neg':diff<0?'pos':''}">${(b||a)&&diff!==0?'$'+Math.abs(diff).toLocaleString():'-'}</td></tr>`;
  });
  document.getElementById('budgetBody').innerHTML=html;
}

function renderChecklist(){
  const saved=JSON.parse(localStorage.getItem('wedding_checks')||'{}');
  let total=0,done=0;
  let html='';
  Object.entries(checklist).forEach(([grp,items])=>{
    html+=`<div class="check-group"><h3>📌 ${grp}</h3>`;
    items.forEach((item,i)=>{
      const key=grp+':'+i;
      const checked=saved[key]||false;
      if(checked)done++; total++;
      html+=`<div class="check-item${checked?' done':''}" id="ci-${key.replace(/[^a-z0-9]/gi,'_')}">
        <input type="checkbox" id="cb_${key.replace(/[^a-z0-9]/gi,'_')}" ${checked?'checked':''} onchange="toggleCheck('${key}',this.checked)">
        <label for="cb_${key.replace(/[^a-z0-9]/gi,'_')}">${item}</label>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('checklistContainer').innerHTML=html;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('checkBar').style.width=pct+'%';
  document.getElementById('checkProgress').textContent=`已完成 ${done} / ${total} 項（${pct}%）`;
}
function toggleCheck(key,val){
  const saved=JSON.parse(localStorage.getItem('wedding_checks')||'{}');
  saved[key]=val; localStorage.setItem('wedding_checks',JSON.stringify(saved));
  renderChecklist();
}

      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('prepContainer').innerHTML=html;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prepBar').style.width=pct+'%';
  document.getElementById('prepProgress').textContent=`已完成 ${done} / ${total} 項（${pct}%）`;
}
function togglePrep(key,val){
  const saved=JSON.parse(localStorage.getItem('wedding_prep')||'{}');
  saved[key]=val; localStorage.setItem('wedding_prep',JSON.stringify(saved));
  
}
</script>
